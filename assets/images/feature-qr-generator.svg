<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-label="QR code generation">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="shadow4" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity=".25"/>
    </filter>
  </defs>
  <rect width="1600" height="1000" rx="56" fill="url(#bg4)"/>
  <g opacity=".14" fill="#fff">
    <circle cx="220" cy="250" r="130"/>
    <circle cx="1360" cy="260" r="90"/>
    <circle cx="1420" cy="840" r="160"/>
  </g>
  <g filter="url(#shadow4)">
    <rect x="210" y="170" width="1180" height="660" rx="44" fill="#ffffff" opacity=".95"/>
  </g>
  <g transform="translate(290 255)">
    <rect width="520" height="490" rx="26" fill="#f9fafb" stroke="#e5e7eb"/>
    <rect x="560" width="540" height="120" rx="22" fill="#111827" opacity=".95"/>
    <rect x="560" y="150" width="540" height="340" rx="22" fill="#f3f4f6"/>
    <rect x="590" y="184" width="240" height="22" rx="11" fill="#111827" opacity=".85"/>
    <rect x="590" y="222" width="380" height="18" rx="9" fill="#6b7280" opacity=".55"/>
    <rect x="590" y="256" width="340" height="18" rx="9" fill="#6b7280" opacity=".45"/>
    <rect x="590" y="312" width="220" height="64" rx="18" fill="#f97415"/>
    <rect x="820" y="312" width="250" height="64" rx="18" fill="#e5e7eb"/>
  </g>
  <g transform="translate(350 315)">
    <rect width="400" height="380" rx="22" fill="#fff"/>
    <g transform="translate(44 44)" fill="#111827">
      <rect width="120" height="120" rx="14"/>
      <rect x="192" width="120" height="120" rx="14"/>
      <rect y="192" width="120" height="120" rx="14"/>
      <rect x="192" y="192" width="40" height="40" rx="8"/>
      <rect x="272" y="192" width="40" height="40" rx="8"/>
      <rect x="192" y="272" width="40" height="40" rx="8"/>
      <rect x="272" y="272" width="40" height="40" rx="8"/>
      <rect x="152" y="152" width="40" height="40" rx="8"/>
    </g>
    <rect x="132" y="310" width="140" height="18" rx="9" fill="#6b7280" opacity=".55"/>
  </g>
  <g fill="#ffffff" opacity=".95">
    <text x="850" y="330" font-family="Inter, Arial, sans-serif" font-weight="800" font-size="46">QR Generator</text>
  </g>
</svg>
